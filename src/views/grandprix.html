{% extends "base.html" %}

{% block content %}
<section class="section">
    <div class="container has-text-centered">
        <div class="columns">
            <div class="column">
                <div class="card">
                    <div class="card-content">
                        <div id="gp-app"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
const SEASON    = {{ season|json_encode|raw }};
const YEAR      = "{{ year }}";
const ALL_YEARS = {{ all_years|json_encode|raw }};

const app = document.getElementById('gp-app');

// Pre-compute GP standings for this season
const standingsMap = {};
const played = {};
for (const t of SEASON.tournaments) {
    for (const p of t.players) {
        played[p.name] = (played[p.name] || 0) + 1;
        if (p.gp_points > 0) {
            if (!standingsMap[p.name]) standingsMap[p.name] = { name: p.name, total: 0, results: [] };
            standingsMap[p.name].total += p.gp_points;
            standingsMap[p.name].results.push({ id: t.id, name: t.name, pts: p.gp_points });
        }
    }
}
const GP = Object.values(standingsMap)
    .map(s => ({ ...s, played: played[s.name] || s.results.length }))
    .sort((a, b) => b.total - a.total);

function route() {
    const hash = location.hash.slice(1) || 'gp';
    const parts = hash.split('/');
    const view = parts[0];
    if (view === 'gp' && parts[1]) renderPlayer(decodeURIComponent(parts[1]));
    else if (view === 'gp') renderGP();
    else if (view === 't' && parts[2]) renderPlayerMatches(parts[1], parseInt(parts[2]));
    else if (view === 't') renderTournament(parts[1]);
    else renderGP();
}

function formatDate(dateStr) {
    const parts = dateStr.split(', ');
    return (parts.length === 2 && parts[0] === parts[1]) ? parts[0] : dateStr;
}

function yearTabs() {
    return '<div class="tabs"><ul>' +
        ALL_YEARS.slice().reverse().map(y =>
            `<li class="${y === YEAR ? 'is-active' : ''}" ${y === YEAR ? 'id="gp-tab-active"' : ''}><a href="/grandprix/${y}/">${y}</a></li>`
        ).join('') +
        '</ul></div>';
}

function nav(t) {
    const back = `<a href="#gp" class="button is-small is-light">Grand Prix ${YEAR}</a>`;
    const tourn = t ? ` <a href="#t/${t.id}" class="button is-small is-light ml-2">${t.name}</a>` : '';
    return `<div class="has-text-centered" style="margin-bottom:1.5rem">${back}${tourn}</div>`;
}

function renderGP() {
    const tournaments = SEASON.tournaments || [];

    const standingsHtml = GP.length > 0
        ? `<h3 class="title is-5">Classifica</h3>
           <div class="table-container has-text-left">
           <table class="table is-fullwidth is-striped">
               <thead><tr>
                   <th class="has-text-centered">N°</th>
                   <th>Giocatore</th>
                   <th class="has-text-centered">Punti GP</th>
                   <th class="has-text-centered">Tornei</th>
               </tr></thead>
               <tbody>${GP.map((s, i) =>
                   `<tr>
                       <td class="has-text-centered">${i + 1}</td>
                       <td><a href="#gp/${encodeURIComponent(s.name)}">${s.name}</a></td>
                       <td class="has-text-centered"><strong>${s.total}</strong></td>
                       <td class="has-text-centered">${s.played}</td>
                   </tr>`
               ).join('')}</tbody>
           </table></div>`
        : '<p class="has-text-grey">Nessun punteggio Grand Prix registrato per questo anno.</p>';

    const tournamentsHtml = tournaments.length > 0
        ? `<h3 class="title is-5 mt-5">Tornei</h3>
           <div class="table-container has-text-left">
           <table class="table is-fullwidth is-striped">
               <thead><tr>
                   <th>Torneo</th>
                   <th>Luogo</th>
                   <th class="has-text-centered">Data</th>
               </tr></thead>
               <tbody>${tournaments.map(t =>
                   `<tr>
                       <td><a href="#t/${t.id}">${t.name}</a></td>
                       <td>${t.location}</td>
                       <td class="has-text-centered">${formatDate(t.date)}</td>
                   </tr>`
               ).join('')}</tbody>
           </table></div>`
        : '';

    app.innerHTML =
        `<span class="icon has-text-warning is-large"><i class="fas fa-trophy fa-2x"></i></span>
        <h1 class="title">Grand Prix ${YEAR}</h1>` +
        yearTabs() + standingsHtml + tournamentsHtml;

    document.getElementById('gp-tab-active')?.scrollIntoView({ behavior: 'instant', block: 'nearest', inline: 'center' });
}

function renderPlayer(name) {
    const s = GP.find(x => x.name === name);
    if (!s) { app.innerHTML = '<p>Giocatore non trovato.</p>'; return; }

    const rows = s.results.map(r => {
        const t = SEASON.tournaments.find(x => x.id === r.id);
        const p = t ? t.players.find(x => x.name === name) : null;
        return `<tr>
            <td class="has-text-left"><a href="#t/${r.id}">${r.name}</a></td>
            <td class="has-text-centered">${p ? p.pos : '—'}</td>
            <td class="has-text-centered">${p ? p.pts : '—'}</td>
            <td class="has-text-centered"><strong>${r.pts}</strong></td>
        </tr>`;
    });

    app.innerHTML =
        nav(null) +
        `<h1 class="title mt-5 mb-4">${name}</h1>
        <p class="subtitle">Stagione ${YEAR} &middot; <strong>${s.total}</strong> punti Grand Prix in ${s.played} torneo/i</p>
        <div class="table-container has-text-left">
        <table class="table is-fullwidth is-striped">
            <thead><tr>
                <th>Torneo</th>
                <th class="has-text-centered">Pos</th>
                <th class="has-text-centered">Punti torneo</th>
                <th class="has-text-centered">Punti GP</th>
            </tr></thead>
            <tbody>${rows.join('')}</tbody>
        </table></div>`;
}

function renderTournament(id) {
    const t = SEASON.tournaments.find(x => x.id === id);
    if (!t) { app.innerHTML = '<p>Torneo non trovato.</p>'; return; }

    const tbNames = t.tiebreak_names || [];

    const rows = t.players.map(p => {
        const tbCells = tbNames.map((_, i) =>
            `<td class="has-text-centered">${p.tiebreaks[i] ?? '-'}</td>`
        ).join('');
        return `<tr>
            <td class="has-text-centered">${p.pos}</td>
            <td class="has-text-left"><a href="#t/${id}/${p.pos}">${p.name}</a></td>
            <td class="has-text-centered"><strong>${p.pts}</strong></td>
            ${tbCells}
            <td class="has-text-centered">${p.gp_points > 0 ? `<strong>${p.gp_points}</strong>` : '-'}</td>
        </tr>`;
    }).join('');

    const tbHeaders = tbNames.map(n => `<th class="has-text-centered">${n}</th>`).join('');

    app.innerHTML =
        nav(null) +
        `<h1 class="title mt-5 mb-4">${t.name}</h1>
        <p class="subtitle">${t.location} &middot; ${formatDate(t.date)}</p>
        <div class="table-container has-text-left">
        <table class="table is-fullwidth is-striped">
            <thead><tr>
                <th class="has-text-centered">N°</th>
                <th>Nome</th>
                <th class="has-text-centered">Pts</th>
                ${tbHeaders}
                <th class="has-text-centered">Punti GP</th>
            </tr></thead>
            <tbody>${rows}</tbody>
        </table></div>`;
}

function renderPlayerMatches(id, pos) {
    const t = SEASON.tournaments.find(x => x.id === id);
    if (!t) { app.innerHTML = '<p>Torneo non trovato.</p>'; return; }

    const p = t.players.find(x => x.pos === pos);
    if (!p) { app.innerHTML = '<p>Giocatore non trovato.</p>'; return; }

    const byPos = {};
    for (const pl of t.players) byPos[pl.pos] = pl;

    const rows = p.rounds.map((r, i) => {
        if (r === '--') {
            return `<tr>
                <td class="has-text-centered">${i + 1}</td>
                <td class="has-text-centered">—</td>
                <td>—</td>
                <td class="has-text-centered"><span class="tag is-light">Bye</span></td>
            </tr>`;
        }
        const res = r[0], col = r[1], oppPos = parseInt(r.slice(2));
        const opp = byPos[oppPos];
        const cls = res === '+' ? 'is-success' : res === '-' ? 'is-danger' : 'is-warning';
        const colEmoji = col === 'W' ? '⬜' : '⬛';
        const score = res === '='
            ? '0.5 - 0.5'
            : ((col === 'W') === (res === '+')) ? '1 - 0' : '0 - 1';
        const oppLink = opp
            ? `<a href="#t/${id}/${oppPos}">${opp.name}</a> <small class="has-text-grey">(${opp.pts} pt)</small>`
            : oppPos;
        return `<tr>
            <td class="has-text-centered">${i + 1}</td>
            <td class="has-text-centered">${colEmoji}</td>
            <td class="has-text-left">${oppLink}</td>
            <td class="has-text-centered"><span class="tag ${cls}">${score}</span></td>
        </tr>`;
    }).join('');

    const gpNote = p.gp_points > 0 ? ` &middot; <strong>${p.gp_points}</strong> punti GP` : '';

    app.innerHTML =
        nav(t) +
        `<h1 class="title mt-5 mb-4">${p.name}</h1>
        <p class="subtitle">${t.name} &middot; ${p.pts} punti${gpNote}</p>
        <div class="table-container has-text-left">
        <table class="table is-fullwidth is-striped">
            <thead><tr>
                <th class="has-text-centered">T</th>
                <th class="has-text-centered">Col</th>
                <th>Avversario</th>
                <th class="has-text-centered">Ris</th>
            </tr></thead>
            <tbody>${rows}</tbody>
        </table></div>`;
}

window.addEventListener('hashchange', route);
route();
</script>
{% endblock %}
