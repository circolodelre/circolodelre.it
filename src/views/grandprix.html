{% extends "base.html" %}

{% block content %}
<section class="section">
    <div class="container has-text-centered">
        <div class="columns">
            <div class="column">
                <div class="card">
                    <div class="card-content">
                        <div id="gp-app"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
const SEASONS = {{ seasons|json_encode|raw }};

const app = document.getElementById('gp-app');
const years = Object.keys(SEASONS).sort().reverse();

// Pre-compute GP standings per year
const GP = {};
for (const [year, data] of Object.entries(SEASONS)) {
    const standings = {};
    for (const t of data.tournaments) {
        for (const p of t.players) {
            if (p.gp_points > 0) {
                if (!standings[p.name]) standings[p.name] = { name: p.name, total: 0, results: [] };
                standings[p.name].total += p.gp_points;
                standings[p.name].results.push({ id: t.id, name: t.name, pts: p.gp_points });
            }
        }
    }
    GP[year] = Object.values(standings).sort((a, b) => b.total - a.total);
}

function route() {
    const hash = location.hash.slice(1) || ('gp/' + years[0]);
    const parts = hash.split('/');
    const view = parts[0];
    if (view === 'gp' && parts[2]) renderPlayer(parts[1] || years[0], decodeURIComponent(parts[2]));
    else if (view === 'gp') renderGP(parts[1] || years[0]);
    else if (view === 't' && parts[3]) renderPlayerMatches(parts[1], parts[2], parseInt(parts[3]));
    else if (view === 't') renderTournament(parts[1], parts[2]);
    else renderGP(years[0]);
}

function formatDate(dateStr) {
    const parts = dateStr.split(', ');
    return (parts.length === 2 && parts[0] === parts[1]) ? parts[0] : dateStr;
}

function yearTabs(active) {
    return '<div class="tabs"><ul>' +
        years.map(y => `<li class="${y === active ? 'is-active' : ''}"><a href="#gp/${y}">${y}</a></li>`).join('') +
        '</ul></div>';
}

function nav(year, t) {
    const back = `<a href="#gp/${year}" class="button is-small is-light">Grand Prix ${year}</a>`;
    const tourn = t ? ` <a href="#t/${year}/${t.id}" class="button is-small is-light ml-2">${t.name}</a>` : '';
    return `<div class="has-text-left mb-5">${back}${tourn}</div>`;
}

function renderGP(year) {
    const standings = GP[year] || [];
    const tournaments = (SEASONS[year] || {}).tournaments || [];

    const standingsHtml = standings.length > 0
        ? `<h3 class="title is-5">Classifica</h3>
           <div class="table-container has-text-left">
           <table class="table is-fullwidth is-striped">
               <thead><tr>
                   <th class="has-text-centered">N°</th>
                   <th>Giocatore</th>
                   <th class="has-text-centered">Punti GP</th>
                   <th class="has-text-centered">Tornei</th>
               </tr></thead>
               <tbody>${standings.map((s, i) =>
                   `<tr>
                       <td class="has-text-centered">${i + 1}</td>
                       <td><a href="#gp/${year}/${encodeURIComponent(s.name)}">${s.name}</a></td>
                       <td class="has-text-centered"><strong>${s.total}</strong></td>
                       <td class="has-text-centered">${s.results.length}</td>
                   </tr>`
               ).join('')}</tbody>
           </table></div>`
        : '<p class="has-text-grey">Nessun punteggio Grand Prix registrato per questo anno.</p>';

    const tournamentsHtml = tournaments.length > 0
        ? `<h3 class="title is-5 mt-5">Tornei</h3>
           <div class="table-container has-text-left">
           <table class="table is-fullwidth is-striped">
               <thead><tr>
                   <th>Torneo</th>
                   <th>Luogo</th>
                   <th class="has-text-centered">Data</th>
               </tr></thead>
               <tbody>${tournaments.map(t =>
                   `<tr>
                       <td><a href="#t/${year}/${t.id}">${t.name}</a></td>
                       <td>${t.location}</td>
                       <td class="has-text-centered">${formatDate(t.date)}</td>
                   </tr>`
               ).join('')}</tbody>
           </table></div>`
        : '';

    app.innerHTML =
        `<span class="icon has-text-warning is-large"><i class="fas fa-trophy fa-2x"></i></span>
        <h1 class="title">Grand Prix ${year}</h1>` +
        yearTabs(year) + standingsHtml + tournamentsHtml;
}

function renderPlayer(year, name) {
    const standings = GP[year] || [];
    const s = standings.find(x => x.name === name);
    if (!s) { app.innerHTML = '<p>Giocatore non trovato.</p>'; return; }

    const rows = s.results.map(r => {
        const t = (SEASONS[year] || {}).tournaments.find(x => x.id === r.id);
        const p = t ? t.players.find(x => x.name === name) : null;
        return `<tr>
            <td class="has-text-left"><a href="#t/${year}/${r.id}">${r.name}</a></td>
            <td class="has-text-centered">${p ? p.pos : '—'}</td>
            <td class="has-text-centered">${p ? p.pts : '—'}</td>
            <td class="has-text-centered"><strong>${r.pts}</strong></td>
        </tr>`;
    });

    app.innerHTML =
        nav(year, null) +
        `<h1 class="title">${name}</h1>
        <p class="subtitle">Stagione ${year} &middot; <strong>${s.total}</strong> punti Grand Prix in ${s.results.length} torneo/i</p>
        <div class="table-container has-text-left">
        <table class="table is-fullwidth is-striped">
            <thead><tr>
                <th>Torneo</th>
                <th class="has-text-centered">Pos</th>
                <th class="has-text-centered">Punti torneo</th>
                <th class="has-text-centered">Punti GP</th>
            </tr></thead>
            <tbody>${rows.join('')}</tbody>
        </table></div>`;
}

function renderTournament(year, id) {
    const data = SEASONS[year] || {};
    const t = (data.tournaments || []).find(x => x.id === id);
    if (!t) { app.innerHTML = '<p>Torneo non trovato.</p>'; return; }

    const rows = t.players.map(p =>
        `<tr>
            <td class="has-text-centered">${p.pos}</td>
            <td class="has-text-left"><a href="#t/${year}/${id}/${p.pos}">${p.name}</a></td>
            <td class="has-text-centered">${p.rating || '-'}</td>
            <td class="has-text-centered"><strong>${p.pts}</strong></td>
            <td class="has-text-centered">${p.gp_points > 0 ? `<strong>${p.gp_points}</strong>` : '-'}</td>
        </tr>`
    ).join('');

    app.innerHTML =
        nav(year, null) +
        `<h1 class="title">${t.name}</h1>
        <p class="subtitle">${t.location} &middot; ${formatDate(t.date)}</p>
        <div class="table-container has-text-left">
        <table class="table is-fullwidth is-striped">
            <thead><tr>
                <th class="has-text-centered">N°</th>
                <th>Nome</th>
                <th class="has-text-centered">Rtg</th>
                <th class="has-text-centered">Pts</th>
                <th class="has-text-centered">Punti GP</th>
            </tr></thead>
            <tbody>${rows}</tbody>
        </table></div>`;
}

function renderPlayerMatches(year, id, pos) {
    const data = SEASONS[year] || {};
    const t = (data.tournaments || []).find(x => x.id === id);
    if (!t) { app.innerHTML = '<p>Torneo non trovato.</p>'; return; }

    const p = t.players.find(x => x.pos === pos);
    if (!p) { app.innerHTML = '<p>Giocatore non trovato.</p>'; return; }

    const byPos = {};
    for (const pl of t.players) byPos[pl.pos] = pl;

    const rows = p.rounds.map((r, i) => {
        if (r === '--') {
            return `<tr>
                <td class="has-text-centered">${i + 1}</td>
                <td class="has-text-centered"><span class="tag is-light">Bye</span></td>
                <td>—</td><td>—</td>
            </tr>`;
        }
        const res = r[0], col = r[1], oppPos = parseInt(r.slice(2));
        const opp = byPos[oppPos];
        const cls = res === '+' ? 'is-success' : res === '-' ? 'is-danger' : 'is-warning';
        const label = res === '+' ? 'Vittoria' : res === '-' ? 'Sconfitta' : 'Patta';
        const oppLink = opp
            ? `<a href="#t/${year}/${id}/${oppPos}">${opp.name}</a> <small class="has-text-grey">(${opp.pts} pt)</small>`
            : oppPos;
        return `<tr>
            <td class="has-text-centered">${i + 1}</td>
            <td class="has-text-centered"><span class="tag ${cls}">${label}</span></td>
            <td>${col === 'B' ? 'Nero' : 'Bianco'}</td>
            <td class="has-text-left">${oppLink}</td>
        </tr>`;
    }).join('');

    const gpNote = p.gp_points > 0 ? ` &middot; <strong>${p.gp_points}</strong> punti GP` : '';

    app.innerHTML =
        nav(year, t) +
        `<h1 class="title">${p.name}</h1>
        <p class="subtitle">${t.name} &middot; ${p.pts} punti${gpNote}</p>
        <div class="table-container has-text-left">
        <table class="table is-fullwidth is-striped">
            <thead><tr>
                <th class="has-text-centered">Turno</th>
                <th class="has-text-centered">Risultato</th>
                <th>Colore</th>
                <th>Avversario</th>
            </tr></thead>
            <tbody>${rows}</tbody>
        </table></div>`;
}

window.addEventListener('hashchange', route);
route();
</script>
{% endblock %}
